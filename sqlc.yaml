version: "2"

sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "db/query"
    gen:
      go:
        package: "db"
        out: "internal/db/sqlc"
        sql_package: "database/sql"
        emit_db_tags: true
        emit_empty_slices: true
        emit_interface: true
        emit_json_tags: true
